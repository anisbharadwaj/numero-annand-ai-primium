<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero Annand AI Premium</title>
    <!-- Bootstrap 5 CSS Framework CDN -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- Google Fonts Infrastructure bindings -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary glass-panel m-3 position-sticky top-0 z-3">
        <div class="container">
            <a class="navbar-brand text-gradient-gold fw-bold" href="{{ url_for('main.index_route') }}">✨ Numero Annand AI</a>
            <div class="ms-auto">
                <a href="{{ url_for('main.pricing_route') }}" class="btn btn-outline-light btn-sm me-2">View Reports</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.dashboard_route') }}" class="btn btn-info btn-sm me-2">Portal</a>
                <a href="{{ url_for('auth.logout_route') }}" class="btn btn-danger btn-sm">Exit</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% include 'alerts.html' %}
        {% block content %}{% endblock %}
    </div>

    <footer class="container text-center text-muted py-5 border-top border-secondary mt-5">
        <p>© 2026 Numero Annand AI Premium. Managed under Executive Bank Custody Account: Ananda Sarmah.</p>
    </footer>

    <script src="https://jsdelivr.net"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
