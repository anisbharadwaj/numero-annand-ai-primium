{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8 glass-panel p-4">
        <h3 class="mb-4 text-gradient-gold">Profile Deployment Formulation Matrix</h3>
        <span class="badge bg-dark mb-4 border border-secondary text-info p-2">Target Profile Matrix: {{ report_label }} (₹{{ amount }})</span>
        
        <form method="POST" action="{{ url_for('payments.checkout_route', plan_type=plan_type) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-muted small">Full Legal Name</label>
                    <input type="text" name="name" class="form-control custom-input" required autocomplete="off">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Date of Birth</label>
                    <input type="date" name="dob" class="form-control custom-input" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Time of Birth (e.g. 14:35)</label>
                    <input type="text" name="birth_time" class="form-control custom-input" placeholder="HH:MM" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Place of Birth (City, State)</label>
                    <input type="text" name="birth_place" class="form-control custom-input" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Mobile Network Identification Vector</label>
                    <input type="tel" name="mobile" class="form-control custom-input" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Target Email Destination Endpoint</label>
                    <input type="email" name="email" class="form-control custom-input" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Gender Manifestation</label>
                    <select name="gender" class="form-select custom-input" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small">Language Parsing Protocol</label>
                    <select name="language" class="form-select custom-input" required>
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Assamese">Assamese</option>
                    </select>
                </div>
                
                {% if plan_type == 'printed' %}
                <div class="col-12">
                    <label class="form-label text-muted small">Physical Delivery Structural Destination Address</label>
                    <textarea name="address" class="form-control custom-input" rows="3" required placeholder="Complete physical postal parameters..."></textarea>
                </div>
                {% endif %}
            </div>
            
            <button type="submit" class="btn btn-gold w-100 py-3 mt-4 text-uppercase">Proceed to Clear Payment Gateway</button>
        </form>
    </div>
</div>
{% endblock %}
